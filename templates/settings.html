{% extends "base.html" %}
{% block title %}Ustawienia — Pracuj.pl Scraper{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
    <h2>Ustawienia filtrów</h2>
    <form method="POST">
        <label for="include">Filtr pozytywny (tylko te kraje)</label>
        <input type="text" id="include" name="include" value="{{ include }}" placeholder="np. Norwegia,Szwecja,Dania">
        <p class="help">Jeśli puste — brane są wszystkie kraje (z wyjątkiem negatywnych). Oddzielaj przecinkami.</p>

        <label for="exclude">Filtr negatywny (wyklucz te kraje)</label>
        <input type="text" id="exclude" name="exclude" value="{{ exclude }}" placeholder="np. Niemcy,Francja,Holandia">
        <p class="help">Te kraje będą pomijane. Oddzielaj przecinkami.</p>

        <button type="submit" style="margin-top:8px">Zapisz</button>
    </form>
</div>
{% endblock %}
